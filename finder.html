<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOSTCODEX — PLANET FINDER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #030810;
            --panel: #070f1e;
            --border: #1a2a45;
            --accent: #4fc3f7;
            --accent2: #a855f7;
            --text: #c8dff0;
            --dim: #4a6a88;
            --success: #00e676;
            --warn: #f5c000;
            --mono: 'Share Tech Mono', monospace;
            --sans: 'Rajdhani', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Starfield canvas behind everything */
        #bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.6;
        }

        .page {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* ── Header ── */
        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header .eyebrow {
            font-family: var(--mono);
            font-size: 0.7rem;
            letter-spacing: 0.35em;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        header h1 {
            font-size: clamp(2rem, 5vw, 3.4rem);
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--dim);
            font-size: 0.95rem;
            margin-top: 0.5rem;
            letter-spacing: 0.05em;
        }

        /* ── Layout grid ── */
        .layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        @media (max-width: 750px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        /* ── Cards ── */
        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.4rem;
        }

        .card-title {
            font-family: var(--mono);
            font-size: 0.65rem;
            letter-spacing: 0.3em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 1.2rem;
            padding-bottom: 0.7rem;
            border-bottom: 1px solid var(--border);
        }

        /* ── Form controls ── */
        .field {
            margin-bottom: 1.1rem;
        }

        label {
            display: block;
            font-family: var(--mono);
            font-size: 0.62rem;
            letter-spacing: 0.2em;
            color: var(--dim);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
        }

        select,
        input[type="number"],
        input[type="range"] {
            width: 100%;
            background: #0b1628;
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.8rem;
            border-radius: 4px;
            padding: 0.45rem 0.6rem;
            appearance: none;
            -webkit-appearance: none;
            transition: border-color 0.2s;
        }

        select:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        select option {
            background: #0b1628;
        }

        .range-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .range-row input[type="number"] {
            width: 70px;
            flex-shrink: 0;
        }

        .range-row span {
            color: var(--dim);
            font-size: 0.75rem;
            font-family: var(--mono);
        }

        /* Checkbox toggles */
        .check-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }

        .check-pill input {
            display: none;
        }

        .check-pill label {
            display: inline-block;
            padding: 0.25rem 0.55rem;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.62rem;
            letter-spacing: 0.15em;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
            color: var(--dim);
        }

        .check-pill input:checked+label {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(79, 195, 247, 0.08);
        }

        /* ── Buttons ── */
        .btn {
            display: block;
            width: 100%;
            padding: 0.7rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: var(--mono);
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #1565c0, #6a1ba3);
            color: #fff;
        }

        .btn-primary:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            filter: none;
            transform: none;
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--dim);
            margin-top: 0.5rem;
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        /* ── Status bar ── */
        #status-bar {
            margin: 0.9rem 0 0;
            padding: 0.5rem 0.7rem;
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            display: none;
            background: rgba(79, 195, 247, 0.06);
            border: 1px solid rgba(79, 195, 247, 0.2);
        }

        #status-bar.visible {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .spinner {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid rgba(79, 195, 247, 0.2);
            border-top-color: var(--accent);
            animation: spin 0.6s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Results panel ── */
        #results-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .no-results {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--dim);
            text-align: center;
            padding: 3rem 1rem;
            letter-spacing: 0.15em;
        }

        /* ── Result card ── */
        .result-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.1rem 1.2rem;
            animation: fadeIn 0.3s ease;
            transition: border-color 0.2s;
        }

        .result-card:hover {
            border-color: var(--accent);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .rc-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.8rem;
        }

        .rc-name {
            font-size: 1.05rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--text);
        }

        .rc-desig {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--dim);
            margin-top: 2px;
        }

        .rc-rarity {
            font-family: var(--mono);
            font-size: 0.6rem;
            letter-spacing: 0.15em;
            padding: 0.18rem 0.5rem;
            border-radius: 12px;
            border: 1px solid;
            flex-shrink: 0;
        }

        .rc-addr {
            font-family: var(--mono);
            font-size: 1rem;
            letter-spacing: 0.08em;
            color: var(--accent);
            margin-bottom: 0.9rem;
            word-break: break-all;
        }

        .rc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 0.5rem;
            margin-bottom: 0.9rem;
        }

        .rc-cell {
            font-size: 0.78rem;
        }

        .rc-cell .k {
            font-family: var(--mono);
            font-size: 0.58rem;
            color: var(--dim);
            letter-spacing: 0.15em;
            display: block;
            margin-bottom: 2px;
        }

        .rc-cell .v {
            font-weight: 600;
        }

        .rc-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .rc-btn {
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            font-family: var(--mono);
            font-size: 0.62rem;
            letter-spacing: 0.15em;
            cursor: pointer;
            text-decoration: none;
            border: 1px solid var(--border);
            color: var(--text);
            background: transparent;
            transition: all 0.15s;
            text-transform: uppercase;
        }

        .rc-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .rc-btn.primary {
            border-color: var(--accent2);
            color: var(--accent2);
        }

        .rc-btn.primary:hover {
            background: rgba(168, 85, 247, 0.12);
        }

        .rc-btn.copy-btn.copied {
            border-color: var(--success);
            color: var(--success);
        }

        /* ── Search stats ── */
        #search-stats {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--dim);
            letter-spacing: 0.12em;
            margin-bottom: 0.8rem;
            display: none;
        }

        #search-stats.visible {
            display: block;
        }

        /* ── Limit slider ── */
        .limit-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .limit-row input[type="range"] {
            flex: 1;
            padding: 0;
        }

        .limit-val {
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--accent);
            min-width: 2ch;
        }

        /* Glyph range filter */
        .glyph-range {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .glyph-range input[type="number"] {
            width: 60px;
        }

        .glyph-range span {
            color: var(--dim);
            font-family: var(--mono);
            font-size: 0.75rem;
        }
    </style>
</head>

<body>
    <canvas id="bg"></canvas>

    <div class="page">
        <header>
            <p class="eyebrow">LOSTCODEX · DISCOVERY SYSTEM v1.0</p>
            <h1>PLANET FINDER</h1>
            <p>Define parameters — the system searches the address space for matching worlds</p>
        </header>

        <div class="layout">
            <!-- ── Filter panel ── -->
            <aside>
                <div class="card">
                    <div class="card-title">Search Parameters</div>

                    <div class="field">
                        <label>Biome Type</label>
                        <select id="f-biome">
                            <option value="">ANY BIOME</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Scale</label>
                        <select id="f-scale">
                            <option value="">ANY SCALE</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Tuning System</label>
                        <select id="f-tuning">
                            <option value="">ANY TUNING</option>
                            <option value="Equal">Equal (12-TET)</option>
                            <option value="Just">Just Intonation</option>
                            <option value="Pythagorean">Pythagorean</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Address Length Range</label>
                        <div class="glyph-range">
                            <input type="number" id="f-len-min" min="4" max="30" placeholder="min" value="4" />
                            <span>—</span>
                            <input type="number" id="f-len-max" min="4" max="30" placeholder="max" value="12" />
                        </div>
                    </div>

                    <div class="field">
                        <label>Moons</label>
                        <select id="f-moons">
                            <option value="">ANY</option>
                            <option value="0">None</option>
                            <option value="1">1+</option>
                            <option value="2">2+</option>
                            <option value="3">3+</option>
                            <option value="4">4+</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>Root Frequency (Hz)</label>
                        <div class="range-row">
                            <input type="number" id="f-freq-min" min="20" max="500" placeholder="min" />
                            <span>—</span>
                            <input type="number" id="f-freq-max" min="20" max="500" placeholder="max" />
                            <span>Hz</span>
                        </div>
                    </div>

                    <div class="field">
                        <label>Features</label>
                        <div class="check-group">
                            <div class="check-pill"><input type="checkbox" id="f-microtone" /><label
                                    for="f-microtone">μTONE</label></div>
                            <div class="check-pill"><input type="checkbox" id="f-stretch" /><label
                                    for="f-stretch">STRETCH</label></div>
                            <div class="check-pill"><input type="checkbox" id="f-percussion" /><label
                                    for="f-percussion">HAS PERC</label></div>
                            <div class="check-pill"><input type="checkbox" id="f-chords" /><label
                                    for="f-chords">CHORDS</label></div>
                        </div>
                    </div>

                    <div class="field">
                        <label>Results to generate: <span class="limit-val" id="limit-val">5</span></label>
                        <div class="limit-row">
                            <input type="range" id="f-limit" min="1" max="20" value="5" />
                        </div>
                    </div>

                    <button class="btn btn-primary" id="btn-search">◈ GENERATE</button>
                    <button class="btn btn-secondary" id="btn-clear">RESET FILTERS</button>

                    <div id="status-bar">
                        <div class="spinner"></div>
                        <span id="status-text">SEARCHING…</span>
                    </div>
                </div>
            </aside>

            <!-- ── Results panel ── -->
            <main>
                <div id="search-stats"></div>
                <div id="results-panel">
                    <div class="no-results">
                        ◈ &nbsp; Define parameters and search to discover planets
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { generatePlanet } from './src/planet.js';
        import { GLYPHS, BIOMES, SCALES, ROOT_NOTES, TUNING_NAMES } from './src/data.js';
        import { RNG } from './src/rng.js';

        // URL encoding: convert glyph indices to base-36 (0-9a-t)
        function encodeAddress(address) {
            return [...address].map(g => {
                const idx = GLYPHS.indexOf(g);
                return idx >= 0 ? idx.toString(36) : '0';
            }).join('');
        }

        // ── Populate dropdowns from live data ────────────────────────
        const biomeSelect = document.getElementById('f-biome');
        BIOMES.forEach(b => {
            const o = document.createElement('option');
            o.value = b.id; o.textContent = b.name;
            biomeSelect.appendChild(o);
        });

        const scaleSelect = document.getElementById('f-scale');
        Object.keys(SCALES).forEach(name => {
            const o = document.createElement('option');
            o.value = name; o.textContent = name;
            scaleSelect.appendChild(o);
        });

        // ── Limit slider display ──────────────────────────────────────
        const limitSlider = document.getElementById('f-limit');
        const limitVal = document.getElementById('limit-val');
        limitSlider.addEventListener('input', () => limitVal.textContent = limitSlider.value);

        // ── Helpers ───────────────────────────────────────────────────
        const $ = id => document.getElementById(id);
        const rarity = addr => {
            const l = [...addr].length;
            return l <= 3 ? 'COMMON' : l <= 6 ? 'STANDARD' : l <= 10 ? 'UNCOMMON' : l <= 15 ? 'RARE' : 'ANOMALOUS';
        };
        const rarityColor = r => ({ COMMON: '#9e9e9e', STANDARD: '#4fc3f7', UNCOMMON: '#a855f7', RARE: '#f5c000', ANOMALOUS: '#ff5722' }[r] || '#fff');

        function randomAddress(rng) {
            const len = rng.int(1, 20);
            let a = '';
            for (let i = 0; i < len; i++) a += rng.pick(GLYPHS);
            return a;
        }

        // ── Filter builder ────────────────────────────────────────────
        function buildFilters() {
            const filters = [];

            const valueOf = id => $(id)?.value ?? '';
            const checkedOf = id => !!$(id)?.checked;

            const biome = valueOf('f-biome');
            if (biome) filters.push(p => p.biome.id === biome);

            const scale = valueOf('f-scale');
            if (scale) filters.push(p => p.scaleName === scale);

            const tuning = valueOf('f-tuning');
            if (tuning) filters.push(p => p.tuningSystem === tuning);

            const rarityF = valueOf('f-rarity');
            if (rarityF) filters.push(p => rarity(p.address || p.pname) === rarityF);

            const moons = valueOf('f-moons');
            if (moons !== '') {
                const moonThreshold = parseInt(moons, 10);
                filters.push(p => moonThreshold === 0 ? p.numMoons === 0 : p.numMoons >= moonThreshold);
            }

            const freqMin = parseFloat(valueOf('f-freq-min'));
            const freqMax = parseFloat(valueOf('f-freq-max'));
            if (!isNaN(freqMin)) filters.push(p => p.rootFreq >= freqMin);
            if (!isNaN(freqMax)) filters.push(p => p.rootFreq <= freqMax);

            const lenMin = parseInt(valueOf('f-len-min'), 10);
            const lenMax = parseInt(valueOf('f-len-max'), 10);
            if (!isNaN(lenMin)) filters.push(p => [...p.address].length >= lenMin);
            if (!isNaN(lenMax)) filters.push(p => [...p.address].length <= lenMax);

            if (checkedOf('f-microtone')) filters.push(p => (p.quarterToneProb || 0) > 0);
            if (checkedOf('f-stretch')) filters.push(p => (p.octaveStretch || 2) > 1.001);
            if (checkedOf('f-percussion')) filters.push(p => (p.ac?.percVoices?.length || 0) > 0);
            if (checkedOf('f-chords')) filters.push(p => (p.ac?.chordProb || 0) > 0.3);

            return filters;
        }

        // ── Deterministic Generator (Library of Babel Style) ──────────
        let searching = false;

        function runSearch() {
            const limit = parseInt(limitSlider.value, 10);
            const panel = $('results-panel');
            const statsEl = $('search-stats');
            const btn = $('btn-search');
            const filters = buildFilters();

            panel.innerHTML = '';
            statsEl.classList.add('visible');
            searching = true;
            btn.disabled = true;
            statsEl.textContent = `↳ Generating ${limit} matching coordinates...`;

            const scaleKeys = Object.keys(SCALES);
            const seedBase = Date.now();
            const seen = new Set();
            const matches = [];
            const maxAttempts = Math.max(limit * 1200, 4000);
            let attempts = 0;

            while (matches.length < limit && attempts < maxAttempts) {
                const rng = new RNG(seedBase + attempts);
                attempts++;

                // 1. Biome Glyph
                let bIdx = $('f-biome').value ? BIOMES.findIndex(b => b.id === $('f-biome').value) : rng.int(0, BIOMES.length);
                const g0 = GLYPHS[bIdx % GLYPHS.length];

                // 2. Scale Glyph
                let sIdx = $('f-scale').value ? scaleKeys.indexOf($('f-scale').value) : rng.int(0, scaleKeys.length);
                const g1 = GLYPHS[sIdx % GLYPHS.length];

                // 3. Root Note Glyph
                let rIdx = rng.int(0, ROOT_NOTES.length);
                const fMin = parseFloat($('f-freq-min').value);
                const fMax = parseFloat($('f-freq-max').value);
                if (!isNaN(fMin) || !isNaN(fMax)) {
                    const validRoots = ROOT_NOTES.map((f, idx) => ({ f, idx })).filter(n =>
                        (isNaN(fMin) || n.f >= fMin) && (isNaN(fMax) || n.f <= fMax)
                    );
                    if (validRoots.length > 0) rIdx = rng.pick(validRoots).idx;
                }
                const g2 = GLYPHS[rIdx % GLYPHS.length];

                // 4. Flags Glyph (Tuning + Features)
                let flags = 0;
                const tuning = $('f-tuning').value;
                if (tuning === 'Equal') flags += 0;
                else if (tuning === 'Just') flags += 1;
                else if (tuning === 'Pythagorean') flags += 2;
                else flags = rng.int(0, 3);

                if ($('f-microtone').checked) flags |= 4;
                if ($('f-stretch').checked) flags |= 8;
                // Add some random bits for flavor if not strictly defined
                flags |= (rng.int(0, 2) << 4);
                const g3 = GLYPHS[flags % GLYPHS.length];

                // 5. Tail (Random Entropy)
                let addr = g0 + g1 + g2 + g3;
                const rawMinLen = parseInt($('f-len-min').value, 10);
                const rawMaxLen = parseInt($('f-len-max').value, 10);
                const minLen = Number.isFinite(rawMinLen) ? rawMinLen : 4;
                const maxLen = Number.isFinite(rawMaxLen) ? rawMaxLen : 12;
                const lenLo = Math.max(4, Math.min(minLen, maxLen));
                const lenHi = Math.max(lenLo, maxLen);
                const targetLen = rng.int(lenLo, lenHi + 1);

                while ([...addr].length < targetLen) {
                    addr += rng.pick(GLYPHS);
                }

                if (seen.has(addr)) continue;
                const planet = generatePlanet(addr);
                if (!filters.every(fn => fn(planet))) continue;
                seen.add(addr);
                matches.push({ addr, planet });
                renderResult(addr, planet, panel);
            }

            queueMicrotask(() => {
                if (!matches.length) {
                    panel.innerHTML = '<div class="no-results">◈ &nbsp; No planets matched these filters. Try relaxing the search.</div>';
                }

                const found = matches.length;
                const plural = found === 1 ? '' : 's';
                statsEl.textContent = found === limit
                    ? `Found ${found} planet${plural} after ${attempts} attempts.`
                    : `Found ${found} planet${plural} after ${attempts} attempts. Try relaxing the filters for more results.`;
            });
            searching = false;
            btn.disabled = false;
            return;

            statsEl.textContent = `↳ Instantly generated ${limit} planets matching your criteria.`;
        }

        // ── Render a result card ──────────────────────────────────────
        function renderResult(addr, p, panel) {
            const r = rarity(addr);
            const col = rarityColor(r);
            const addrLen = [...addr].length;

            const tuningLabel = p.tuningSystem
                + (p.quarterToneProb > 0 ? ' · μTONE' : '')
                + ((p.octaveStretch || 2) > 1.001 ? ' · STRETCH' : '');

            const hasMoons = p.numMoons > 0;
            const moonsLabel = hasMoons ? `${p.numMoons} SATELLITE${p.numMoons > 1 ? 'S' : ''}` : 'NONE';
            const hasPerc = (p.ac?.percVoices?.length || 0) > 0;

            const card = document.createElement('div');
            card.className = 'result-card';
            card.innerHTML = `
        <div class="rc-head">
            <div>
                <div class="rc-name">${p.pname.toUpperCase()}</div>
                <div class="rc-desig">${p.designation}</div>
            </div>
            <span class="rc-rarity" style="color:${col};border-color:${col}">${r}</span>
        </div>
        <div class="rc-addr">${addr}</div>
        <div class="rc-grid">
            <div class="rc-cell"><span class="k">BIOME</span><span class="v">${p.biome.name}</span></div>
            <div class="rc-cell"><span class="k">SCALE</span><span class="v">${p.scaleName}</span></div>
            <div class="rc-cell"><span class="k">TUNING</span><span class="v">${tuningLabel}</span></div>
            <div class="rc-cell"><span class="k">ROOT FREQ</span><span class="v">${p.rootFreq.toFixed(1)} Hz</span></div>
            <div class="rc-cell"><span class="k">DRONE</span><span class="v">${p.ac?.droneWave?.replace('_', ' ') || '?'}</span></div>
            <div class="rc-cell"><span class="k">PAD</span><span class="v">${p.ac?.padWave?.replace('_', ' ') || '?'}</span></div>
            <div class="rc-cell"><span class="k">VOICES</span><span class="v" style="font-size:0.65rem">${p.ac?.melodyWaves?.join(', ').replace(/_/g, ' ') || '?'}</span></div>
            <div class="rc-cell"><span class="k">CHORDS</span><span class="v">${p.progression.join(' - ')}</span></div>
            <div class="rc-cell"><span class="k">CHORD LIFT</span><span class="v">${Math.round((p.ac?.chordAudibility || 0) * 100)}%</span></div>
            <div class="rc-cell"><span class="k">PERCUSSION</span><span class="v">${hasPerc ? 'YES' : 'NONE'}</span></div>
            <div class="rc-cell"><span class="k">GLYPHS</span><span class="v">${addrLen}</span></div>
            <div class="rc-cell"><span class="k">SONIC</span><span class="v" style="color:${p.biome.glowColor};font-size:0.7rem">${p.biome.soundProfile}</span></div>
        </div>
        <div class="rc-actions">
            <button class="rc-btn copy-btn" data-addr="${addr}">⎘ COPY ADDRESS</button>
            <a class="rc-btn primary" href="synth.html#${encodeAddress(addr)}" target="_blank">▶ OPEN IN SYNTH</a>
            <a class="rc-btn" href="index.html#${encodeAddress(addr)}" target="_blank">◈ OPEN IN EXPLORER</a>
        </div>
    `;

            // Copy button
            card.querySelector('.copy-btn').addEventListener('click', function () {
                navigator.clipboard.writeText(addr).then(() => {
                    this.textContent = '✓ COPIED';
                    this.classList.add('copied');
                    setTimeout(() => { this.textContent = '⎘ COPY ADDRESS'; this.classList.remove('copied'); }, 2000);
                });
            });

            panel.appendChild(card);
        }

        // ── Wire up buttons ───────────────────────────────────────────
        $('btn-search').addEventListener('click', () => {
            if (searching) { searchAbort = true; }
            else { runSearch(); }
        });

        $('btn-clear').addEventListener('click', () => {
            $('f-biome').value = '';
            $('f-scale').value = '';
            $('f-tuning').value = '';
            $('f-limit').value = '5';
            $('limit-val').textContent = '5';
            $('f-moons').value = '';
            $('f-freq-min').value = '';
            $('f-freq-max').value = '';
            $('f-len-min').value = '';
            $('f-len-max').value = '';
            $('f-microtone').checked = false;
            $('f-stretch').checked = false;
            $('f-percussion').checked = false;
            $('f-chords').checked = false;
            $('results-panel').innerHTML = '<div class="no-results">◈ &nbsp; Define parameters and search to discover planets</div>';
            $('search-stats').classList.remove('visible');
        });

        // ── Minimal starfield ─────────────────────────────────────────
        (function () {
            const cv = document.getElementById('bg');
            const ctx = cv.getContext('2d');
            function resize() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
            resize(); window.addEventListener('resize', resize);
            const stars = Array.from({ length: 180 }, () => ({
                x: Math.random(), y: Math.random(),
                r: Math.random() * 1.4 + 0.2,
                a: Math.random() * 0.7 + 0.1,
                spd: Math.random() * 0.0003 + 0.0001
            }));
            let phase = 0;
            function draw() {
                ctx.clearRect(0, 0, cv.width, cv.height);
                phase += 0.005;
                stars.forEach(s => {
                    const a = s.a * (0.7 + 0.3 * Math.sin(phase + s.x * 10));
                    ctx.beginPath();
                    ctx.arc(s.x * cv.width, s.y * cv.height, s.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(180,220,255,${a})`;
                    ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            draw();
        })();
    </script>
</body>

</html>
